<style>
:root{--bg:#0d1117;--card:#161b22;--text:#c9d1d9;--acento:#8b5cf6;--borde:#30363d}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;margin:0;padding:20px}
h1{color:var(--acento)}
.filtros{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.filtros select,.filtros input{background:var(--card);color:var(--text);border:1px solid var(--borde);padding:6px 12px;border-radius:6px}
.filtros input{width:260px}
.recurso{background:var(--card);border:1px solid var(--borde);border-radius:8px;padding:16px;margin-bottom:12px;cursor:pointer}
.recurso:hover{border-color:var(--acento)}
.recurso h3{margin:0;color:var(--acento);font-size:1.1em}
.recurso .tipo{display:inline-block;background:#21262d;color:#8b949e;padding:2px 8px;border-radius:12px;font-size:.75em;margin-left:8px}
.recurso .desc{margin:8px 0 4px;font-size:.9em;color:#acb4be}
.recurso .detalle{display:none;margin-top:12px;border-top:1px solid var(--borde);padding-top:12px}
.recurso.abierto .detalle{display:block}
pre{background:#0d1117;border:1px solid var(--borde);border-radius:6px;padding:12px;overflow-x:auto;font-size:.85em;white-space:pre-wrap}
.btn-copiar{background:var(--acento);color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;margin-top:8px;font-size:.8em}
.btn-copiar:hover{opacity:.9}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:6px;color:#fff;z-index:9999;background:#3fb950;animation:desvanecer 2s forwards}
@keyframes desvanecer{0%,80%{opacity:1}100%{opacity:0}}
</style>
</head>

function render(l) {
  var d = document.getElementById('lista'), h = '';
  for (var i = 0; i < l.length; i++) {
    var x = l[i];
    h += '<div class="recurso" onclick="this.classList.toggle(\'abierto\')"><h3>' + x.n + '<span class="tipo">' + x.t + '</span></h3><p class="desc">' + x.d + '</p><div class="detalle"><p><b>ruta:</b> ' + x.f + '</p><p><b>instalacion:</b> ' + x.i + '</p><p><b>ejemplo:</b></p><pre>' + x.e.replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</pre><button class="btn-copiar" onclick="event.stopPropagation(); navigator.clipboard.writeText(\'' + x.e.replace(/\\/g,'\\\\').replace(/'/g,"\\'") + '\'); mostrarToast(\'copiado\')">copiar ejemplo</button></div></div>';
  }
  d.innerHTML = h;
}

function filtrar() {
  var t = document.getElementById('busqueda').value.toLowerCase();
  var p = document.getElementById('filtroTipo').value;
  var f = [];
  for (var i = 0; i < r.length; i++) {
    var x = r[i];
    if ((p === 'todos' || x.t === p) && (x.n.toLowerCase().indexOf(t) !== -1 || x.d.toLowerCase().indexOf(t) !== -1)) f.push(x);
  }
  render(f);
}

function mostrarToast(m) {
  var t = document.createElement('div');
  t.className = 'toast';
  t.textContent = m;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 2000);
}

render(r);
